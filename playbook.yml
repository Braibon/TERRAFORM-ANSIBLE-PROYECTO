---
- name: 1. Configurar NAT y Balanceador (Nginx)
  hosts: proxy
  become: true
  tasks:
    - name: Habilitar IP Forwarding para función NAT
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: true

    - name: Instalar iptables-persistent y Nginx
      apt:
        name: 
          - iptables-persistent
          - nginx
        state: present
        update_cache: true

    - name: Configurar regla NAT (Masquerade)
      iptables:
        table: nat
        chain: POSTROUTING
        out_interface: ens5 # Interfaz por defecto en t3.small
        jump: MASQUERADE

    - name: Guardar reglas de iptables
      shell: iptables-save > /etc/iptables/rules.v4

    - name: Configurar Nginx como Proxy Inverso
      copy:
        dest: /etc/nginx/conf.d/balanceador.conf
        content: |
          upstream servidores_web {
              least_conn;
              server {{ hostvars['web1']['ansible_host'] }};
              server {{ hostvars['web2']['ansible_host'] }};
          }
          server {
              listen 80;
              server_name localhost;
              location / {
                  proxy_pass http://servidores_web;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Eliminar sitio por defecto de Nginx y reiniciar
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reiniciar Nginx

  handlers:
    - name: Reiniciar Nginx
      systemd: name=nginx state=restarted

- name: 2. Configurar Servidores Web (Apache, PHP, MariaDB Local y WordPress)
  hosts: webservers
  become: true
  tasks:
    - name: Instalar Apache, PHP y extensiones (Página 36)
      apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-mysql
          - php-curl
          - php-gd
          - php-mbstring
          - php-xml
          - php-xmlrpc
          - php-soap
          - php-intl
          - php-zip
          - unzip
          - mariadb-server  
          - python3-pymysql 
        state: present
        update_cache: true

    - name: Iniciar servicio MariaDB
      systemd: name=mariadb state=started enabled=true

    - name: Crear Base de Datos Local para WordPress
      mysql_db:
        name: wordpress
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Crear Usuario de Base de Datos Local
      mysql_user:
        name: wordpress
        password: "usuario@1"
        priv: "wordpress.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Descargar y extraer WordPress
      unarchive:
        src: https://es.wordpress.org/latest-es_ES.tar.gz
        dest: /var/www/html/
        remote_src: true
        extra_opts: [--strip-components=1]

    - name: Configurar wp-config.php apuntando a localhost
      copy:
        dest: /var/www/html/wp-config.php
        content: |
          <?php
          define('DB_NAME', 'wordpress');
          define('DB_USER', 'wordpress');
          define('DB_PASSWORD', 'usuario@1');
          define('DB_HOST', 'localhost'); 
          define('DB_CHARSET', 'utf8mb4');
          define('DB_COLLATE', '');
          $table_prefix  = 'wp_albreadto_';
          if ( !defined('ABSPATH') ) define('ABSPATH', dirname(__FILE__) . '/');
          require_once(ABSPATH . 'wp-settings.php');
          ?>

    - name: Configurar permisos de Apache
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        recurse: true

    - name: Eliminar index.html por defecto de Apache
      file: path=/var/www/html/index.html state=absent

- name: 3. Configurar Servidor de Monitorización
  hosts: monitor
  become: true
  tasks:
    - name: Instalar Python3 y PIP
      apt:
        name: python3-pip
        state: present
        update_cache: true
    - name: Crear carpeta para el script
      file:
        path: /home/ubuntu/Carpeta_Script
        state: directory
        owner: ubuntu
        mode: '0755'