[proxy]
ProxyNat ansible_host=54.221.142.102 ansible_user=ubuntu

[webservers]
web1 ansible_host=10.0.1.78 ansible_user=ubuntu
web2 ansible_host=10.0.1.112 ansible_user=ubuntu

[monitor]
mon1 ansible_host=10.0.1.129 ansible_user=ubuntu

[webservers:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -q ubuntu@54.221.142.102"'

[monitor:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -q ubuntu@54.221.142.102"'

[all:vars]
ansible_ssh_private_key_file=./vockey.pem
ansible_ssh_extra_args='-o StrictHostKeyChecking=no'